# Minimal Postgres for running/testing the schema in migrations/.
# There is no application server in this repo — see README for why.
services:
  postgres:
    image: postgres:16-alpine
    container_name: agentic-crm-os-db
    restart: unless-stopped
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_crm_os}
    volumes:
      - acrm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  acrm-pgdata:
    driver: local
