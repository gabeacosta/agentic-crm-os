###############################################################################
# GenticOS - Production Docker Compose
# Domain: example.com (api / app / webhooks subdomains)
# Traefik on n8n_default handles TLS termination
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # Data Layer
  # ---------------------------------------------------------------------------
  operator-db:
    image: postgres:16-alpine
    container_name: genticos-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - genticos-pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - genticos-net

  redis:
    image: redis:7-alpine
    container_name: genticos-redis
    restart: unless-stopped
    ports:
      - "6479:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - genticos-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - genticos-net

  minio:
    image: minio/minio
    container_name: genticos-minio
    restart: unless-stopped
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address :9001
    volumes:
      - genticos-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - genticos-net

  init-minio:
    image: minio/mc
    container_name: genticos-init-minio
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set genticos http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing genticos/genticos-artifacts;
      mc mb --ignore-existing genticos/genticos-backups;
      mc anonymous set download genticos/genticos-artifacts;
      echo 'MinIO buckets initialized.';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - genticos-net

  # ---------------------------------------------------------------------------
  # Policy Engine
  # ---------------------------------------------------------------------------
  opa:
    image: openpolicyagent/opa:0.70.0
    container_name: genticos-opa
    restart: unless-stopped
    ports:
      - "8281:8181"
    command: run --server --addr :8181 /policies /data
    volumes:
      - ./opa/policies:/policies:ro
      - ./opa/data:/data:ro
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - genticos-net

  # ---------------------------------------------------------------------------
  # Application Layer
  # ---------------------------------------------------------------------------
  control-plane:
    build:
      context: .
      dockerfile: packages/control-plane/Dockerfile
    container_name: genticos-control-plane
    restart: unless-stopped
    ports:
      - "4100:4100"
    depends_on:
      operator-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 4100
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4100/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      # --- api.example.com ---
      - "traefik.enable=true"
      - "traefik.http.routers.genticos-api.rule=Host(`api.example.com`)"
      - "traefik.http.routers.genticos-api.entrypoints=websecure"
      - "traefik.http.routers.genticos-api.tls=true"
      - "traefik.http.routers.genticos-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.genticos-api.service=genticos-api-svc"
      - "traefik.http.services.genticos-api-svc.loadbalancer.server.port=4100"
      # --- webhooks.example.com ---
      - "traefik.http.routers.genticos-webhooks.rule=Host(`webhooks.example.com`)"
      - "traefik.http.routers.genticos-webhooks.entrypoints=websecure"
      - "traefik.http.routers.genticos-webhooks.tls=true"
      - "traefik.http.routers.genticos-webhooks.tls.certresolver=letsencrypt"
      - "traefik.http.routers.genticos-webhooks.service=genticos-webhooks-svc"
      - "traefik.http.services.genticos-webhooks-svc.loadbalancer.server.port=4100"
    networks:
      - genticos-net
      - n8n_default

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    container_name: genticos-worker
    restart: unless-stopped
    ports:
      - "4300:4300"
    depends_on:
      control-plane:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 4300
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4300/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - genticos-net

  dashboard:
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile
    container_name: genticos-dashboard
    restart: unless-stopped
    ports:
      - "4200:3000"
    depends_on:
      control-plane:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.genticos-app.rule=Host(`app.example.com`)"
      - "traefik.http.routers.genticos-app.entrypoints=websecure"
      - "traefik.http.routers.genticos-app.tls=true"
      - "traefik.http.routers.genticos-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.genticos-app.service=genticos-app-svc"
      - "traefik.http.services.genticos-app-svc.loadbalancer.server.port=3000"
    networks:
      - genticos-net
      - n8n_default

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus
    container_name: genticos-prometheus
    restart: unless-stopped
    ports:
      - "9190:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - genticos-net

  grafana:
    image: grafana/grafana
    container_name: genticos-grafana
    restart: unless-stopped
    ports:
      - "4400:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.example.com"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - genticos-grafana:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - genticos-net

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  genticos-pgdata:
    driver: local
  genticos-minio:
    driver: local
  genticos-redis:
    driver: local
  genticos-grafana:
    driver: local

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  genticos-net:
    driver: bridge
  n8n_default:
    external: true
